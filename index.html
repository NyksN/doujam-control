<script>
const firebaseConfig = {
apiKey:"AIzaSyBEXfWs0B3qG5gjswJtvQbgminrBU4XzuE",
authDomain:"doujam-ed005.firebaseapp.com",
databaseURL:"https://doujam-ed005-default-rtdb.firebaseio.com",
projectId:"doujam-ed005"
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("timerState");

function start(){

const h = Number(document.getElementById("h").value || 0);
const m = Number(document.getElementById("m").value || 0);
const s = Number(document.getElementById("s").value || 0);

const timeLeft = h*3600 + m*60 + s;

ref.set({
title:document.getElementById("title").value || "DOU JAM",
mode:document.getElementById("mode").value,
timeLeft:timeLeft,
running:true,
finished:false
});
}

function pause(){
ref.update({running:false});
}

function reset(){
ref.set({
title:"DOU JAM",
timeLeft:0,
running:false,
finished:false
});
}

function closeFinish(){
ref.update({finished:false});
}
</script>
